services:
  # ============================================
  # Backend Service (Node.js + Express)
  # ============================================
  - type: web
    name: survey-app-backend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    healthCheckPath: /api/health
    
    envVars:
      - key: DB_HOST
        value: 103.212.120.166
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        value: qugusxax_drmanojdiwakar_db
      - key: DB_USER
        value: qugusxax_drmanojdiwakar
      - key: DB_PASSWORD
        scope: secret
        value: Uz{xHU*ejAF8*TAP
      - key: DB_SSL
        value: "false"
      - key: DB_POOL_SIZE
        value: "10"
      
      - key: JWT_SECRET
        scope: secret
        value: 7X4sV3nQ!9mLp2@bT6kJz8#rNc5$wQ1dF0yH
      - key: JWT_EXPIRE
        value: "1h"
      
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      
      # CORS: Allow Hostinger frontend AND Render frontend
      - key: CORS_ORIGINS
        value: "https://drmanojdiwakar.org,https://survey-app-frontend.onrender.com"
      - key: SITE_URL
        value: "https://drmanojdiwakar.org"
      
      - key: RATE_LIMIT_MAX
        value: "300"
      - key: AUTH_RATE_LIMIT_MAX
        value: "20"
      
      # SMTP Settings
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: surveyproteam@gmail.com
      - key: SMTP_PASS
        scope: secret
        value: pgvjnwqirluqmkbj
      - key: SMTP_FROM_EMAIL
        value: surveyproteam@gmail.com
      - key: SMTP_FROM_NAME
        value: InsightForge

  # ============================================
  # Frontend Service (React)
  # ============================================
  - type: web
    name: survey-app-frontend
    env: node
    plan: free
    region: oregon
    buildCommand: "cd client && npm install && npm run build"
    startCommand: "npm install -g serve && serve -s client/build -l 3000"
    healthCheckPath: /
    
    envVars:
      - key: REACT_APP_API_URL
        value: https://survey-app-backend.onrender.com/api
      - key: REACT_APP_SITE_URL
        value: https://survey-app-frontend.onrender.com
      - key: NODE_ENV
        value: production
